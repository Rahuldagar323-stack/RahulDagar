document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

KILLS -->\n  <section id=\"skills\" style=\"background:#101315; color:#E9EBE6; margin-top:56px;\">\n    <div style=\"max-width:1180px; margin:0 auto; padding:62px 40px;\">\n      <div style=\"display:flex; align-items:baseline; gap:14px; margin-bottom:40px;\">\n        <span style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; color:#3FD686; letter-spacing:0.06em;\">02<\u002Fspan>\n        <h2 style=\"font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:clamp(23px,2.6vw,32px); letter-spacing:-0.02em; margin:0; color:#F4F5F1;\">Capabilities<\u002Fh2>\n      <\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:minmax(0,0.95fr) minmax(0,1.45fr); gap:24px; align-items:start;\">\n        <!-- CHANNEL SELECTOR -->\n        <div style=\"border:1px solid rgba(244,245,241,0.12); border-radius:14px; overflow:hidden;\">\n          <sc-for list=\"{{ diamonds }}\" as=\"d\" hint-placeholder-count=\"5\">\n            <div onmouseenter=\"{{ d.onEnter }}\" onclick=\"{{ d.onEnter }}\" style=\"display:flex; align-items:center; gap:14px; padding:16px 18px; cursor:pointer; border-bottom:1px solid rgba(244,245,241,0.07); background:{{ d.bg }}; transition:background .2s ease;\">\n              <span style=\"width:4px; height:26px; border-radius:2px; background:{{ d.bar }}; flex:none; transition:background .2s ease;\"><\u002Fspan>\n              <span style=\"font-family:'IBM Plex Mono',monospace; font-size:10.5px; letter-spacing:0.08em; width:34px; color:{{ d.codeColor }}; transition:color .2s ease;\">{{ d.code }}<\u002Fspan>\n              <span style=\"font-family:'Space Grotesk',sans-serif; font-weight:500; font-size:15px; color:#F4F5F1; flex:1;\">{{ d.title }}<\u002Fspan>\n              <span style=\"font-family:'IBM Plex Mono',monospace; font-size:13px; color:{{ d.codeColor }}; transition:color .2s ease;\">{{ d.arrow }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <!-- DETAIL PANEL -->\n ); border-radius:16px; overflow:hidden; box-shadow:0 28px 64px -36px rgba(16,19,21,0.45);\">\n        <img src=\"69eb4754-9e96-4db2-99c7-21676b208111\" alt=\"Rahul Dagar with the Ross Video team at Broadcast India 2025\" style=\"display:block; width:100%; height:auto;\">\n      <\u002Fdiv>\n      <figcaption style=\"display:flex; justify-content:space-between; flex-wrap:wrap; gap:10px; font-family:'IBM Plex Mono',monospace; font-size:11.5px; color:#86898B; letter-spacing:0.04em; margin-top:14px;\">\n        <span>BROADCAST INDIA 2025 · ROSS VIDEO TEAM<\u002Fspan>\n        <span>LIVE EVENT FLOOR<\u002Fspan>\n      <\u002Ffigcaption>\n    <\u002Ffigure>\n\n    <div style=\"display:grid; grid-template-columns:minmax(0,1fr) minmax(0,1fr); gap:64px;\">\n      <div>\n        <p style=\"font-size:16px; line-height:1.62; color:#26292C; font-weight:300; margin:0 0 18px; text-align:justify;\">\n          I work where signals meet hardware — diagnosing the complex systems that carry video, audio, data, and RF, then making them reliable enough to run live in front of the world.\n        <\u002Fp>\n        <p style=\"font-size:15px; line-height:1.62; color:#44484B; font-weight:300; margin:0; text-align:justify;\">\n          My background spans fiber-optic transport, DVB-S/S2 modulation, IP networking, and MATLAB/Simulink modeling — paired with the project discipline of a PMP. I'm equally comfortable on a bench with a Phabrix analyzer, in Wireshark chasing a packet, or coordinating a 20-project delivery schedule.\n        <\u002Fp>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:0.08em; color:#5A5F62; margin-bottom:22px;\">EDUCATION<\u002Fdiv>\n        <sc-for list=\"{{ education }}\" as=\"e\" hint-placeholder-count=\"2\">\n          <div style=\"padding:18px 0; border-top:1px solid rgba(22,25,27,0.16);\">\n            <h3 style=\"font-family:'Space Grotesk',sans-serif; font-weight:500; font-size:17px; margin:0 0 5px;\">{{ e.degree }}<\u002Fh3>\n            <div style=\"font-size:14.5px; color:#44484B; font-weight:300;\">{{ e.school }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n        <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:0.08em; color:#5A5F62; margin:34px 0 18px;\">CERTIFICATIONS<\u002Fdiv>\n        <div style=\"display:flex; flex-wrap:wrap; gap:9px;\">\n          <sc-for list=\"{{ certs }}\" as=\"c\" hint-placeholder-count=\"4\">\n            <span style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; color:#16191B; border:1px solid rgba(22,25,27,0.25); padding:7px 13px; border-radius:6px;\">{{ c }}<\u002Fspan>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- CONTACT -->\n  <section id=\"contact\" style=\"max-width:1180px; margin:48px auto 0; padding:0 40px 30px;\">\n    <div style=\"background:#16191B; color:#F4F5F1; border-radius:20px; padding:clamp(34px,5vw,60px); position:relative; overflow:hidden;\">\n      <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; letter-spacing:0.08em; color:#3FD686; margin-bottom:20px;\">04 / LET'S TALK<\u002Fdiv>\n      <h2 style=\"font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:clamp(26px,3.6vw,44px); line-height:1.04; letter-spacing:-0.025em; margin:0 0 34px; max-width:15ch;\">Have a system that needs to stay locked?<\u002Fh2>\n      <div style=\"display:flex; flex-wrap:wrap; gap:36px;\">\n        <a href=\"mailto:dagarrahul4@gmail.com\" style=\"display:flex; flex-direction:column; gap:6px; text-decoration:none; color:inherit;\">\n          <span style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:0.08em; color:#8A8E88;\">EMAIL<\u002Fspan>\n          <span style=\"font-family:'Space Grotesk',sans-serif; font-size:18px; font-weight:500;\">dagarrahul4@gmail.com<\u002Fspan>\n        <\u002Fa>\n        <a href=\"mailto:dagarrahul165@gmail.com\" style=\"display:flex; flex-direction:column; gap:6px; text-decoration:none; color:inherit;\">\n          <span style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:0.08em; color:#8A8E88;\">EMAIL · ALT<\u002Fspan>\n          <span style=\"font-family:'Space Grotesk',sans-serif; font-size:18px; font-weight:500;\">dagarrahul165@gmail.com<\u002Fspan>\n        <\u002Fa>\n        <a href=\"tel:+12267870013\" style=\"display:flex; flex-direction:column; gap:6px; text-decoration:none; color:inherit;\">\n          <span style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:0.08em; color:#8A8E88;\">PHONE<\u002Fspan>\n          <span style=\"font-family:'Space Grotesk',sans-serif; font-size:18px; font-weight:500;\">+1 226-787-0013<\u002Fspan>\n        <\u002Fa>\n        <div style=\"display:flex; flex-direction:column; gap:6px;\">\n          <span style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:0.08em; color:#8A8E88;\">LOCATION<\u002Fspan>\n          <span style=\"font-family:'Space Grotesk',sans-serif; font-size:18px; font-weight:500;\">Ottawa, ON · Canada<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; gap:6px;\">\n          <span style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:0.08em; color:#8A8E88;\">WORK ELIGIBILITY<\u002Fspan>\n          <span style=\"font-family:'Space Grotesk',sans-serif; font-size:18px; font-weight:500;\">Canadian citizen · TN visa eligible (USA)<\u002Fspan>\n        <\u002Fdiv>\n        <a href=\"https://www.linkedin.com/in/rahuldagar9002\" target=\"_blank\" rel=\"noopener\" style=\"display:flex; flex-direction:column; gap:6px; text-decoration:none; color:inherit;\">\n          <span style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:0.08em; color:#8A8E88;\">LINKEDIN<\u002Fspan>\n          <span style=\"font-family:'Space Grotesk',sans-serif; font-size:18px; font-weight:500;\">/in/rahuldagar9002 ↗<\u002Fspan>\n        <\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FOOTER -->\n  <footer style=\"max-width:1240px; margin:0 auto; padding:34px 40px 50px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px; font-family:'IBM Plex Mono',monospace; font-size:11.5px; color:#86898B; letter-spacing:0.04em;\">\n    <span>© 2026 RAHUL DAGAR<\u002Fspan>\n    <a href=\"https://www.linkedin.com/in/rahuldagar9002\" target=\"_blank\" rel=\"noopener\" style=\"color:#86898B; text-decoration:none;\">LINKEDIN ↗<\u002Fa>\n    <span>M.ENG · PMP · EIT<\u002Fspan>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  scopeRef = React.createRef();\n  state = { openJobs: {}, activeSkill: 0 };\n\n  toggleJob(i) {\n    this.setState(s => ({ openJobs: { ...s.openJobs, [i]: !s.openJobs[i] } }));\n  }\n\n  skillVals() {\n    const groups = [\n      { code: 'T&D', short: 'Test &\\nDiagnostics', title: 'Test & Diagnostics', items: ['Phabrix', 'Prism', 'Wireshark', 'Signal integrity & RCA'] },\n      { code: 'OPT', short: 'Optical\\n& RF', title: 'Optical & RF', items: ['Fiber-optic transport', 'DVB-S / S2 mod-demod', 'RF encode / decode', 'L-Band / IF routing'] },\n      { code: 'PRG', short: 'Programming\\n& Modeling', title: 'Programming & Modeling', items: ['MATLAB / Simulink', 'SRT · HLS · RIST', 'SNMP · PTP', 'Fault analysis'] },\n      { code: 'NET', short: 'Networking\\n& Design', title: 'Networking & Design', items: ['Routers · Switches', 'VPN · Firewall · SSH', 'Cisco Nexus · Arista', 'Network design · AutoCAD'] },\n      { code: 'STD', short: 'Standards\\n& Cloud', title: 'Standards & Cloud', items: ['SMPTE ST 2110 / 2022-6/7', 'AES67', 'AWS Core (CP)', 'JIRA · Confluence'] },\n    ];\n    const active = this.state.activeSkill;\n    const diamonds = groups.map((g, idx) => {\n      const on = idx === active;\n      return {\n        code: g.code,\n        title: g.title,\n        onEnter: () => this.setState({ activeSkill: idx }),\n        arrow: on ? '▸' : '',\n        bar: on ? '#3FD686' : 'rgba(244,245,241,0.15)',\n        bg: on ? 'rgba(63,214,134,0.08)' : 'transparent',\n        codeColor: on ? '#3FD686' : '#7d827c',\n      };\n    });\n    const g = groups[active];\n    return {\n      diamonds, activeCode: g.code, activeTitle: g.title, activeItems: g.items,\n      chain: [\n        { n: '01', title: 'Source', spec: 'CAMERA · RF · IP' },\n        { n: '02', title: 'Encode', spec: 'DVB-S/S2 · HEVC' },\n        { n: '03', title: 'Transport', spec: 'FIBER · ST 2110' },\n        { n: '04', title: 'Decode', spec: 'IRD · GATEWAY' },\n        { n: '05', title: 'Air', spec: 'LIVE · NDI OUT' },\n      ],\n      chainStats: [\n        { value: '0 dropped', label: 'Frames on air' },\n        { value: '< 1 ms', label: 'PTP sync offset' },\n        { value: '20+', label: 'Systems commissioned' },\n        { value: '24 / 7', label: 'Live reliability' },\n      ],\n    };\n  }\n\n  componentDidMount() {\n    const canvas = this.scopeRef.current;\n    if (!canvas) return;\n    const ctx = canvas.getContext('2d');\n    const dpr = window.devicePixelRatio || 1;\n    let raf, t = 0;\n    const resize = () => {\n      const r = canvas.getBoundingClientRect();\n      if (!r.width) return;\n      canvas.width = r.width * dpr;\n      canvas.height = r.height * dpr;\n      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);\n    };\n    resize();\n    window.addEventListener('resize', resize);\n\n    const draw = () => {\n      const r = canvas.getBoundingClientRect();\n      const w = r.width, h = r.height;\n      ctx.clearRect(0, 0, w, h);\n\n      // grid\n      ctx.strokeStyle = 'rgba(244,245,241,0.06)';\n      ctx.lineWidth = 1;\n      const gx = w / 18;\n      for (let x = 0; x <= w; x += gx) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke(); }\n      const gy = h / 4;\n      for (let y = 0; y <= h; y += gy) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke(); }\n\n      // center baseline\n      const mid = h / 2;\n\n      // glow trace\n      const trace = (color, width, glow, phase, amp) => {\n        ctx.beginPath();\n        for (let x = 0; x <= w; x += 2) {\n          const k = x / w;\n          const env = Math.sin(k * Math.PI); // fade at edges\n          const y = mid\n            + Math.sin(k * 16 + t + phase) * amp * env\n            + Math.sin(k * 41 + t * 1.7 + phase) * (amp * 0.32) * env\n            + Math.sin(k * 7 - t * 0.6) * (amp * 0.45) * env;\n          if (x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);\n        }\n        ctx.strokeStyle = color;\n        ctx.lineWidth = width;\n        ctx.shadowColor = glow;\n        ctx.shadowBlur = glow ? 12 : 0;\n        ctx.lineJoin = 'round';\n        ctx.stroke();\n        ctx.shadowBlur = 0;\n      };\n\n      trace('rgba(30,157,87,0.18)', 1, '', 1.6, h * 0.13);\n      trace('#3FD686', 1.8, 'rgba(63,214,134,0.7)', 0, h * 0.2);\n\n      t += 0.03;\n      raf = requestAnimationFrame(draw);\n    };\n    draw();\n    this._cleanup = () => { cancelAnimationFrame(raf); window.removeEventListener('resize', resize); };\n  }\n\n  componentWillUnmount() { if (this._cleanup) this._cleanup(); }\n\n  renderVals() {\n    return {\n      scopeRef: this.scopeRef,\n      stats: [\n        { value: '10+', label: 'Years experience' },\n        { value: '20+', label: 'Projects delivered' },\n        { value: '98%', label: 'On-time delivery' },\n        { value: 'NAB / IBC', label: 'Live tradeshows' },\n      ],\n      experiences: ([\n        {\n          role: 'Solutions Architect, Demo & Tradeshows',\n          company: 'Ross Video Ltd.',\n          location: 'Ottawa, ON · Canada',\n          period: '01/2025 — 06/2026',\n          tags: ['Phabrix', 'Prism', 'Wireshark', 'ST 2110', 'NDI'],\n          bullets: [\n            'Commissioned and validated Ross and third-party
